<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add, edit, and delete technical blog articles for Bogapurapu Sai Srinivas portfolio.">
  <title>Manage Blog | Bogapurapu Sai Srinivas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-grid" aria-hidden="true"></div>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Go to main page">
      <span class="brand-mark">BS</span>
      <span>Embedded Portfolio</span>
    </a>
    <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="index.html#about">About</a>
      <a href="index.html#projects">Projects</a>
      <a href="index.html#blog">Blog</a>
      <a href="index.html#contact">Contact</a>
      <a href="index.html">Main HTML</a>
    </nav>
  </header>

  <main>
    <section class="section blog-manager" id="blog-manager">
      <div class="section-heading reveal">
        <p class="eyebrow">Blog Editor</p>
        <h1>Add, edit, and delete articles.</h1>
      </div>

      <div class="manager-layout">
        <form class="editor-panel reveal" id="blog-form">
          <input type="hidden" id="article-id">
          <label for="article-category">Category</label>
          <input id="article-category" name="category" type="text" placeholder="Firmware" required>

          <label for="article-title">Article Title</label>
          <input id="article-title" name="title" type="text" placeholder="Designing UART logs for board bring-up" required>

          <label for="article-body">Article Content</label>
          <textarea id="article-body" name="body" rows="9" placeholder="Write the article here..." required></textarea>

          <div class="form-actions">
            <button class="button primary" type="submit" id="save-article">Save Article</button>
            <button class="button secondary" type="button" id="clear-form">Clear</button>
          </div>
        </form>

        <section class="article-panel reveal" aria-labelledby="saved-articles-title">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Saved Articles</p>
              <h2 id="saved-articles-title">Published locally</h2>
            </div>
            <a class="button secondary" href="index.html#blog">View Main Page</a>
          </div>
          <div class="article-list" id="article-list"></div>
          <p class="empty-state" id="empty-state">No articles yet. Add your first blog article with the form.</p>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Bogapurapu Sai Srinivas. Built for GitHub Pages.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
